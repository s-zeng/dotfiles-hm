[colors.tab_bar.new_tab]
bg_color = "#1f1d17"
fg_color = "#b4a89c"

[colors.tab_bar.new_tab_hover]
bg_color = "#3a342a"
fg_color = "#bfbdb6"
italic = true

[metadata]
name = "Warm Burnout Dark"
