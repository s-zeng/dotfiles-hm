# Warm Burnout Dark

[colors]
foreground = "#bfbdb6"
background = "#1a1510"
cursor_bg = "#f5c56e"
cursor_fg = "#1a1510"
cursor_border = "#f5c56e"
selection_fg = "#bfbdb6"
selection_bg = "#33393a"
scrollbar_thumb = "#3a342a"
split = "#b8522e"
visual_bell = "#ffb454"
compose_cursor = "#f5c56e"
ansi = ["#23211b", "#f06b73", "#70bf56", "#fdb04c", "#4fbfff", "#d0a1ff", "#93e2c8", "#c7c7c7"]
