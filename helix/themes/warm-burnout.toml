"annotation" = { fg = "fg" }

"attribute" = { fg = "decorator", modifiers = ["italic"] }

"comment" = { fg = "comment", modifiers = ["italic"] }

"constant" = { fg = "constant" }
"constant.character" = { fg = "regex" }
"constant.character.escape" = { fg = "operator" }
"constant.macro" = { fg = "decorator" }
"constructor" = { fg = "type" }

"definition" = { underline = { color = "accent" } }

"diagnostic" = { underline = { color = "operator", style = "curl" } }
"diagnostic.deprecated" = { modifiers = ["crossed_out"] }
"diagnostic.error" = { underline = { color = "error", style = "curl" } }
"diagnostic.hint" = { underline = { color = "type", style = "curl" } }
"diagnostic.info" = { underline = { color = "regex", style = "curl" } }
"diagnostic.warning" = { underline = { color = "function", style = "curl" } }

"error" = { fg = "error" }
"hint" = { fg = "type" }
"info" = { fg = "regex" }
"warning" = { fg = "function" }

"diff.delta" = { fg = "function" }
"diff.minus" = { fg = "error" }
"diff.plus" = { fg = "string" }

"function" = { fg = "function" }
"function.builtin" = { fg = "member" }
"function.macro" = { fg = "decorator" }

"keyword" = { fg = "keyword", modifiers = ["bold"] }
"keyword.control.import" = { fg = "decorator", modifiers = ["bold"] }

"label" = { fg = "keyword" }

"markup.bold" = { modifiers = ["bold"] }
"markup.heading" = "keyword"
"markup.italic" = { modifiers = ["italic"] }
"markup.link.text" = "tag"
"markup.link.url" = { fg = "regex", modifiers = ["underlined"] }
"markup.raw" = "string"
"markup.strikethrough" = { modifiers = ["crossed_out"] }

"module" = { fg = "type" }

"namespace" = { fg = "fg" }

"operator" = { fg = "operator" }

"punctuation" = { fg = "operator" }

"special" = { fg = "member" }

"string" = { fg = "string" }
"string.regexp" = { fg = "regex" }
"string.special" = { fg = "regex" }
"string.symbol" = { fg = "function" }

"tag" = { fg = "tag", modifiers = ["bold"] }

"type" = { fg = "type", modifiers = ["italic"] }
"type.enum.variant" = { fg = "type", modifiers = ["italic"] }

"ui.background" = { bg = "bg" }
"ui.bufferline" = { fg = "fg", bg = "surface" }
"ui.bufferline.active" = { fg = "bg", bg = "function", modifiers = ["bold"] }
"ui.bufferline.background" = { bg = "surface" }

"ui.cursor" = { fg = "bg", bg = "cursor" }
"ui.cursor.insert" = { fg = "bg", bg = "regex" }
"ui.cursor.normal" = { fg = "bg", bg = "cursor" }
"ui.cursor.select" = { fg = "bg", bg = "operator" }
"ui.cursor.match" = { fg = "fg", bg = "selection" }

"ui.cursor.primary" = { fg = "bg", bg = "cursor" }
"ui.cursor.primary.insert" = { fg = "bg", bg = "regex" }
"ui.cursor.primary.normal" = { fg = "bg", bg = "cursor" }
"ui.cursor.primary.select" = { fg = "bg", bg = "operator" }

"ui.cursorline" = { bg = "surface" }
"ui.cursorline.primary" = { bg = "surface" }

"ui.help" = { bg = "surface", fg = "fg" }
"ui.linenr" = { fg = "muted" }
"ui.linenr.selected" = { fg = "function" }
"ui.menu" = { fg = "fg", bg = "surface_elevated" }
"ui.menu.selected" = { fg = "bg", bg = "accent", modifiers = ["bold"] }
"ui.popup" = { bg = "surface_elevated" }
"ui.picker.header.column" = { underline.style = "line" }
"ui.picker.header.column.active" = { modifiers = ["bold"], underline.style = "line" }
"ui.selection" = { bg = "selection" }
"ui.selection.primary" = { bg = "selection" }

"ui.statusline" = { fg = "fg", bg = "surface" }
"ui.statusline.inactive" = { fg = "muted", bg = "surface" }
"ui.statusline.insert" = { fg = "bg", bg = "regex", modifiers = ["bold"] }
"ui.statusline.normal" = { fg = "bg", bg = "function", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "bg", bg = "operator", modifiers = ["bold"] }

"ui.text" = { fg = "fg" }
"ui.text.focus" = { fg = "function" }
"ui.text.directory" = { fg = "type" }
"ui.virtual.inlay-hint" = { fg = "comment" }
"ui.virtual.jump-label" = { fg = "keyword", modifiers = ["bold"] }
"ui.virtual.ruler" = { bg = "surface" }
"ui.virtual.whitespace" = "surface"
"ui.virtual.wrap" = { fg = "muted" }
"ui.window" = { bg = "surface" }

"variable" = { fg = "fg" }
"variable.builtin" = { fg = "member", modifiers = ["italic"] }
"variable.other.member" = { fg = "member" }
"variable.parameter" = { fg = "tag", modifiers = ["italic"] }

[palette]
accent = "#b8522e"
bg = "#1a1510"
comment = "#b4a89c"
cursor = "#f5c56e"
decorator = "#e6c08a"
error = "#f49090"
fg = "#bfbdb6"
function = "#ffb454"
keyword = "#ff8f40"
member = "#ec9878"
muted = "#8f8478"
operator = "#f29668"
regex = "#96b898"
selection = "#33393a"
string = "#b4bc78"
surface = "#1f1d17"
surface_elevated = "#23211b"
tag = "#dc9e92"
type = "#90aec0"
constant = "#d4a8b8"
